<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RedRom</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RedRom">
<meta name="theme-color" content="#010e06">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231a7a52'/%3E%3Ctext x='50' y='74' font-size='62' text-anchor='middle' fill='%230a1f14' font-family='Georgia,serif' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231a7a52'/%3E%3Ctext x='50' y='74' font-size='62' text-anchor='middle' fill='%230a1f14' font-family='Georgia,serif' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
<style>
:root{--vb:#00e676;--bl:#efffef;--gb:rgba(255,255,255,0.13);--sh:0 8px 32px rgba(0,0,0,0.5);--r:16px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:'Outfit',sans-serif;
  background:linear-gradient(180deg,#010e06 0%,#021a0a 10%,#042d12 22%,#084020 35%,#0d5a2c 50%,#167a40 65%,#22a058 78%,#2ec070 88%,#3dd688 100%) fixed;
  color:var(--bl);overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle 1.5px at 8% 18%,rgba(0,230,118,.5) 0%,transparent 100%),radial-gradient(circle 1px at 92% 8%,rgba(0,230,118,.35) 0%,transparent 100%),radial-gradient(circle 2px at 55% 65%,rgba(0,230,118,.2) 0%,transparent 100%),radial-gradient(circle 1px at 22% 88%,rgba(0,230,118,.4) 0%,transparent 100%);
  z-index:0;pointer-events:none;animation:sparkle 6s ease-in-out infinite alternate;}
#login,#menu,.section,#viewer,#passBox,#tablaModal,#ctxMenu,#toast,#firma{position:relative;z-index:1;}

@keyframes sparkle{0%{opacity:.25}100%{opacity:.9}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-14px) rotate(2deg)}}
@keyframes slideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes cardEntry{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes lockShake{0%,100%{transform:rotate(0)}20%{transform:rotate(-14deg)}40%{transform:rotate(14deg)}60%{transform:rotate(-9deg)}80%{transform:rotate(9deg)}}
@keyframes zoomIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px;padding:30px 20px;animation:slideIn .6s ease;}
.mic{font-size:82px;animation:float 3.5s ease-in-out infinite;filter:drop-shadow(0 0 22px rgba(0,230,118,.6));}
.titulo-app{font-family:'Space Mono',monospace;font-size:2.5em;font-weight:700;letter-spacing:5px;background:linear-gradient(135deg,#00e676,#a8ffcb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub-app{font-size:.82em;color:rgba(255,255,255,.4);letter-spacing:2.5px;text-transform:uppercase;margin-top:-12px;}
.login-card{background:rgba(2,20,8,.7);border:1px solid rgba(0,230,118,.22);border-radius:24px;padding:32px 28px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px;backdrop-filter:blur(24px);box-shadow:var(--sh);}
.iw{position:relative;}
.iw .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none;}
input[type=password],input[type=text],input[type=number]{width:100%;padding:12px 12px 12px 40px;background:rgba(0,0,0,.3);border:1px solid rgba(0,230,118,.2);border-radius:var(--rs);color:var(--bl);font-family:'Outfit',sans-serif;font-size:1em;outline:none;transition:border-color .3s,box-shadow .3s;}
input:focus{border-color:var(--vb)!important;box-shadow:0 0 0 3px rgba(0,230,118,.18);}
.btn-v{padding:13px;background:linear-gradient(135deg,#145c3c,#00e676);border:none;border-radius:var(--rs);color:#010e06;font-family:'Outfit',sans-serif;font-size:1em;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform .15s,box-shadow .3s;box-shadow:0 4px 16px rgba(0,230,118,.35);}
.btn-v:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,230,118,.5);}
.btn-v:active{transform:translateY(0);}
.err{color:#ff6b6b;font-size:.83em;text-align:center;min-height:15px;}

/* MENÚ */
#menu{display:none;flex-direction:column;align-items:center;gap:14px;padding:30px 20px;animation:slideIn .5s ease;}
.mh{text-align:center;margin-bottom:8px;}
.mmIC{font-size:62px;animation:float 3.5s ease-in-out infinite;filter:drop-shadow(0 0 18px rgba(0,230,118,.55));}
.mt{font-family:'Space Mono',monospace;font-size:1.85em;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,#00e676,#a8ffcb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px;}
.bm{padding:16px 10px;background:rgba(2,20,8,.6);border:1px solid rgba(0,230,118,.18);border-radius:var(--r);color:var(--bl);font-family:'Outfit',sans-serif;font-size:.93em;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .25s;backdrop-filter:blur(10px);}
.bm .em{font-size:26px;}
.bm:hover{background:rgba(0,230,118,.14);border-color:var(--vb);transform:translateY(-2px);}
.bms{padding:12px;background:rgba(0,0,0,.22);border:1px solid var(--gb);border-radius:var(--rs);color:rgba(255,255,255,.65);font-family:'Outfit',sans-serif;font-size:.88em;cursor:pointer;width:100%;max-width:360px;transition:all .2s;}
.bms:hover{background:rgba(255,255,255,.08);color:var(--bl);}

/* SECCIONES */
.section{display:none;padding:20px 16px 90px;max-width:680px;margin:0 auto;animation:slideIn .4s ease;}
.sec-hd{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(0,230,118,.2);}
.sec-hd h2{font-family:'Space Mono',monospace;font-size:1.25em;letter-spacing:2px;color:var(--vb);}
.bv{padding:8px 13px;background:rgba(0,0,0,.28);border:1px solid var(--gb);border-radius:8px;color:rgba(255,255,255,.65);font-family:'Outfit',sans-serif;font-size:.83em;cursor:pointer;transition:all .2s;}
.bv:hover{background:rgba(255,255,255,.08);color:var(--bl);}
.bagg{display:flex;align-items:center;gap:8px;padding:13px 20px;background:linear-gradient(135deg,rgba(0,230,118,.18),rgba(0,230,118,.06));border:1px dashed rgba(0,230,118,.45);border-radius:var(--r);color:var(--vb);font-family:'Outfit',sans-serif;font-size:.95em;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:all .25s;margin-bottom:8px;}
.bagg:hover{background:rgba(0,230,118,.14);border-style:solid;}

/* CARDS */
.card{background:rgba(2,22,10,.65);border:1px solid rgba(0,230,118,.16);border-radius:var(--r);padding:16px;margin-bottom:14px;backdrop-filter:blur(14px);box-shadow:var(--sh);transition:border-color .3s;animation:cardEntry .35s ease;}
.card:hover{border-color:rgba(0,230,118,.35);}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;}
.cnum{font-family:'Space Mono',monospace;font-size:.73em;color:rgba(0,230,118,.65);padding:3px 8px;background:rgba(0,230,118,.08);border-radius:6px;border:1px solid rgba(0,230,118,.2);}
.mvb{display:flex;flex-direction:column;gap:4px;}
.bmv{width:28px;height:28px;background:rgba(0,0,0,.3);border:1px solid var(--gb);border-radius:6px;color:rgba(255,255,255,.55);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;}
.bmv:hover{background:rgba(0,230,118,.2);border-color:var(--vb);color:var(--vb);}
.bmv:disabled{opacity:.22;cursor:not-allowed;}
.card textarea{width:100%;min-height:85px;padding:12px;background:rgba(0,0,0,.25);border:1px solid rgba(0,230,118,.15);border-radius:var(--rs);color:var(--bl);font-family:'Outfit',sans-serif;font-size:.95em;resize:vertical;outline:none;transition:border-color .25s;line-height:1.5;}
.card textarea:focus{border-color:var(--vb);box-shadow:0 0 0 2px rgba(0,230,118,.1);}
.dv{height:1px;background:rgba(255,255,255,.1);margin:12px 0;}

/* COLOR */
.sec-label{font-size:.74em;color:rgba(255,255,255,.45);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px;}
.paleta-base{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.pc{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s;flex-shrink:0;}
.pc:hover{transform:scale(1.25);}
.pc.on{border-color:white;transform:scale(1.18);box-shadow:0 0 8px rgba(255,255,255,.45);}
.slider-group{display:flex;flex-direction:column;gap:9px;margin-bottom:10px;}
.slider-row{display:grid;grid-template-columns:90px 1fr 38px;align-items:center;gap:8px;}
.slider-row label{font-size:.72em;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;}
.slider-row input[type=range]{-webkit-appearance:none;height:7px;border-radius:4px;outline:none;cursor:pointer;padding:0;border:none;}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--vb);border:2px solid white;cursor:pointer;}
.slider-val{font-family:'Space Mono',monospace;font-size:.7em;color:rgba(0,230,118,.7);text-align:right;}
.color-prev-row{display:flex;align-items:center;gap:10px;margin-top:4px;}
.color-preview{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.35);flex-shrink:0;}
.btn-ap{flex:1;padding:9px;background:linear-gradient(135deg,#145c3c,#00e676);border:none;border-radius:8px;color:#010e06;font-family:'Outfit',sans-serif;font-size:.85em;font-weight:700;cursor:pointer;}

/* UPLOAD */
.uz{border:1px dashed rgba(0,230,118,.32);border-radius:var(--rs);padding:13px;text-align:center;cursor:pointer;transition:all .25s;color:rgba(255,255,255,.45);font-size:.84em;position:relative;overflow:hidden;}
.uz:hover{border-color:var(--vb);background:rgba(0,230,118,.05);color:var(--bl);}
.uz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.cimg{width:100%;border-radius:var(--rs);cursor:zoom-in;transition:transform .3s;margin-top:6px;display:block;}
.cimg:hover{transform:scale(1.01);}

/* TABLA */
.tw{border-radius:var(--rs);border:1px solid rgba(0,230,118,.2);overflow:auto;min-height:60px;}
.tw table{width:100%;border-collapse:collapse;font-size:.87em;}
.tw td,.tw th{color:var(--bl);padding:8px 10px;min-width:55px;border:1px solid rgba(255,255,255,.15);}
.tw th{font-weight:600;color:var(--vb);background:rgba(0,230,118,.08);}
.tw td[contenteditable=true]{outline:none;}
.tw td[contenteditable=true]:focus{background:rgba(0,230,118,.08);outline:1px solid rgba(0,230,118,.4);}
.tw th[contenteditable=true]{outline:none;}
.tw-ctrl{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.bt{padding:7px 12px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.28);border-radius:8px;color:var(--vb);font-family:'Outfit',sans-serif;font-size:.78em;cursor:pointer;transition:all .2s;}
.bt:hover{background:rgba(0,230,118,.22);}
.rh{width:100%;height:22px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;color:rgba(0,230,118,.3);font-size:14px;letter-spacing:3px;user-select:none;touch-action:none;}
.rh:hover{color:var(--vb);}
.grosor-row{display:grid;grid-template-columns:90px 1fr 38px;align-items:center;gap:8px;margin-bottom:8px;}
.grosor-row label{font-size:.72em;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;}
.grosor-row input[type=range]{-webkit-appearance:none;height:7px;border-radius:4px;outline:none;cursor:pointer;background:linear-gradient(to right,rgba(0,230,118,.3),rgba(0,230,118,.9));border:none;}
.grosor-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--vb);border:2px solid white;cursor:pointer;}

/* BOTONES ACCIÓN */
.card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.btn-acc{padding:8px 13px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);border-radius:8px;color:var(--vb);font-family:'Outfit',sans-serif;font-size:.8em;cursor:pointer;transition:all .2s;}
.btn-acc:hover{background:rgba(0,230,118,.22);}
.btn-acc.danger{color:#ff6b6b;border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.08);}
.btn-acc.danger:hover{background:rgba(255,107,107,.2);}

/* MODAL TABLA */
#tablaModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(16px);justify-content:center;align-items:center;z-index:1300;}
.tmc{background:linear-gradient(145deg,rgba(1,14,6,.97),rgba(4,40,18,.95));border:1px solid rgba(0,230,118,.35);border-radius:24px;padding:26px 22px;width:calc(100% - 32px);max-width:340px;animation:popIn .3s ease;box-shadow:0 30px 80px rgba(0,0,0,.65);}
.tmc h3{font-family:'Space Mono',monospace;color:var(--vb);font-size:.9em;letter-spacing:2px;margin-bottom:16px;text-align:center;}
.dim-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.dim-row label{font-size:.78em;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;min-width:75px;}
.dim-row input[type=number]{width:110px;padding:10px 10px 10px 14px;}
#tablaSizeLabel{text-align:center;font-family:'Space Mono',monospace;font-size:.82em;color:var(--vb);margin-bottom:14px;padding:8px;background:rgba(0,230,118,.06);border-radius:8px;}
.btn-cancel{margin-top:10px;width:100%;padding:10px;background:transparent;border:1px solid rgba(255,255,255,.18);border-radius:10px;color:rgba(255,255,255,.55);cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;}
.btn-cancel:hover{background:rgba(255,255,255,.06);color:var(--bl);}

/* CTX */
#ctxMenu{display:none;position:fixed;z-index:1200;background:rgba(1,14,6,.97);border:1px solid rgba(0,230,118,.28);border-radius:var(--r);padding:8px;min-width:185px;box-shadow:0 20px 60px rgba(0,0,0,.7);backdrop-filter:blur(22px);animation:popIn .22s ease;}
.ci{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;font-size:.9em;font-weight:500;transition:background .2s;color:var(--bl);}
.ci:hover{background:rgba(0,230,118,.12);}
.ci.danger{color:#ff6b6b;}
.ci.danger:hover{background:rgba(255,107,107,.12);}
.cs{height:1px;background:rgba(255,255,255,.1);margin:4px 0;}

/* PASS */
#passBox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.68);backdrop-filter:blur(14px);justify-content:center;align-items:center;z-index:1400;}
.pc2{background:linear-gradient(145deg,rgba(1,14,6,.97),rgba(4,45,20,.95));border:1px solid rgba(0,230,118,.3);border-radius:24px;padding:34px 28px;width:calc(100% - 32px);max-width:320px;position:relative;animation:popIn .3s ease;box-shadow:0 30px 80px rgba(0,0,0,.6);text-align:center;}
.plock{font-size:54px;display:block;margin-bottom:12px;animation:float 2.5s ease-in-out infinite;filter:drop-shadow(0 0 14px rgba(0,230,118,.55));}
.ptit{font-family:'Space Mono',monospace;font-size:1.05em;color:var(--vb);margin-bottom:5px;letter-spacing:2px;}
.psub{font-size:.78em;color:rgba(255,255,255,.38);margin-bottom:18px;}
#closePass{position:absolute;top:13px;right:15px;cursor:pointer;font-size:20px;color:rgba(255,255,255,.38);background:none;border:none;line-height:1;transition:color .2s;}
#closePass:hover{color:var(--bl);}

/* VIEWER */
#viewer{display:none;position:fixed;inset:0;background:rgba(1,8,3,.97);justify-content:center;align-items:center;z-index:1500;animation:zoomIn .25s ease;}
#viewImg{max-width:96%;max-height:88vh;border-radius:var(--r);display:none;}
#viewTabla{max-width:96%;max-height:88vh;background:rgba(2,22,10,.96);border:1px solid rgba(0,230,118,.25);border-radius:var(--r);padding:16px;overflow:auto;display:none;}
#viewTabla table{width:100%;border-collapse:collapse;font-size:.9em;}
#viewTabla td,#viewTabla th{border:1px solid rgba(255,255,255,.15);padding:9px 12px;color:var(--bl);}
#viewTabla th{background:rgba(0,230,118,.14);color:var(--vb);font-weight:600;}
.viewer-close{position:absolute;top:14px;right:16px;width:42px;height:42px;background:rgba(0,230,118,.14);border:1px solid rgba(0,230,118,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:rgba(255,255,255,.7);transition:all .2s;}
.viewer-close:hover{background:rgba(0,230,118,.28);color:var(--bl);}
.viewer-bar{position:absolute;bottom:0;left:0;right:0;padding:14px;background:linear-gradient(0deg,rgba(1,8,3,.9),transparent);display:flex;justify-content:center;}
.viewer-label{font-family:'Space Mono',monospace;font-size:.73em;color:rgba(0,230,118,.55);letter-spacing:1px;}

/* TOAST */
#toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,230,118,.13);border:1px solid rgba(0,230,118,.38);border-radius:30px;padding:10px 22px;font-size:.86em;color:var(--vb);opacity:0;transition:all .3s;pointer-events:none;z-index:2000;backdrop-filter:blur(12px);white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* FIRMA */
#firma{position:fixed;bottom:13px;right:15px;font-family:'Space Mono',monospace;font-size:.68em;color:rgba(0,230,118,.38);letter-spacing:1px;pointer-events:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="mic">🔬</div>
  <div class="titulo-app">RedRom</div>
  <div class="sub-app">Sistema de Notas</div>
  <div class="login-card">
    <div class="iw"><span class="ic">🔑</span>
      <input type="password" id="mainPass" placeholder="Contraseña de acceso" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-v" onclick="login()">Entrar →</button>
    <div id="loginError" class="err"></div>
  </div>
</div>

<!-- MENÚ -->
<div id="menu">
  <div class="mh"><div class="mmIC">🔬</div><div class="mt">RedRom</div></div>
  <div class="mg">
    <button class="bm" onclick="openSection('notas')">  <span class="em">📋</span>Notas</button>
    <button class="bm" onclick="openSection('vista')">  <span class="em">👁</span>Vista</button>
    <button class="bm" onclick="openSection('adicional')"><span class="em">➕</span>Adicional</button>
    <button class="bm" onclick="refreshApp()">          <span class="em">🔄</span>Refrescar</button>
  </div>
  <button class="bms" onclick="logout()">↩ Salir</button>
</div>

<!-- SECCIONES -->
<div id="notas"     class="section"></div>
<div id="vista"     class="section"></div>
<div id="adicional" class="section"></div>

<!-- VIEWER -->
<div id="viewer">
  <div class="viewer-close" onclick="closeViewer()">✕</div>
  <img id="viewImg" alt="">
  <div id="viewTabla"></div>
  <div class="viewer-bar"><span class="viewer-label">🔬 RedRom — Pantalla completa</span></div>
</div>

<!-- POPUP CONTRASEÑA -->
<div id="passBox">
  <div class="pc2">
    <button id="closePass" onclick="cerrarPopup()">✕</button>
    <span class="plock" id="passLock">🔒</span>
    <div class="ptit">Acceso protegido</div>
    <div class="psub">Ingresá la contraseña de edición</div>
    <div class="iw" style="margin-bottom:13px;"><span class="ic">🔑</span>
      <input type="password" id="passInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkPass()">
    </div>
    <button class="btn-v" onclick="checkPass()">Confirmar</button>
    <div id="passError" class="err" style="margin-top:8px;"></div>
  </div>
</div>

<!-- MODAL TABLA -->
<div id="tablaModal">
  <div class="tmc">
    <h3>📊 CREAR TABLA</h3>
    <div class="dim-row">
      <label>Filas</label>
      <div class="iw"><span class="ic">↕</span>
        <input type="number" id="inputFilas" value="3" min="1" max="100" oninput="actualizarLabel()">

/* ── Tabla: guardar como objeto plano en Firestore ──
   En lugar de datos[fila][col] (nested arrays prohibido),
   guardamos datos como objeto: { "0_0":"texto", "0_1":"texto", ... }
   y filas/cols como números separados.
*/
function datosToObj(filas, cols){
  const obj={};
  for(let f=0;f<filas;f++) for(let c=0;c<cols;c++) obj[`${f}_${c}`]="";
  return obj;
}
function getCelda(datos,f,c){ return datos[`${f}_${c}`]||""; }
function setCelda(datos,f,c,val){ datos[`${f}_${c}`]=val; }

/* ══ HSL ══ */
function hslToHex(h,s,l){
  h=+h;s=+s/100;l=+l/100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(-1,Math.min(k-3,9-k,1));return Math.round(255*c).toString(16).padStart(2,"0");};
  return "#"+f(0)+f(8)+f(4);
}
function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h=0,s=0,l=(mx+mn)/2;
  if(mx!==mn){const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=(g-b)/d+(g<b?6:0);else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);}
  return {h:h<0?h+360:h,s:Math.round(s*100),l:Math.round(l*100)};
}

/* ══ CREAR CARD ══ */
function crearCard(item,idx,total,secId){
  const card=document.createElement("div");
  card.className="card"; card.dataset.id=item.id;
  if(item.data.color) card.style.background=hbg(item.data.color);

  let lt=null;
  const sl=(e)=>{lt=setTimeout(()=>{navigator.vibrate&&navigator.vibrate(30);showCtx(e,item.id,secId);},700);};
  const cl=()=>clearTimeout(lt);
  card.addEventListener("mousedown",sl);
  card.addEventListener("touchstart",sl,{passive:true});
  card.addEventListener("mouseup",cl);
  card.addEventListener("mouseleave",cl);
  card.addEventListener("touchend",cl);

  /* TOP */
  const top=document.createElement("div"); top.className="ctop";
  const num=document.createElement("span"); num.className="cnum"; num.textContent=`#${idx+1}`;
  const mb=document.createElement("div"); mb.className="mvb";
  const bu=document.createElement("button"); bu.className="bmv"; bu.textContent="▲"; bu.disabled=idx===0;
  bu.onclick=(e)=>{e.stopPropagation();moverCard(item.id,secId,-1);};
  const bd=document.createElement("button"); bd.className="bmv"; bd.textContent="▼"; bd.disabled=idx===total-1;
  bd.onclick=(e)=>{e.stopPropagation();moverCard(item.id,secId,1);};
  mb.appendChild(bu);mb.appendChild(bd);
  top.appendChild(num);top.appendChild(mb);card.appendChild(top);

  /* TEXTAREA */
  const ta=document.createElement("textarea");
  ta.placeholder="Escribí tu nota aquí…"; ta.value=item.data.text||"";
  ta.addEventListener("blur",()=>updateDoc(doc(db,secId,item.id),{text:ta.value}));
  card.appendChild(ta);

  /* COLOR */
  card.appendChild(dv());
  const clbl=document.createElement("div"); clbl.className="sec-label"; clbl.textContent="Color de fondo";
  card.appendChild(clbl);

  const BASES=["#00e676","#39ff8a","#1a7a52","#0a3d20","#2980d9","#1a4a7a",
               "#8e44ad","#5a1a8c","#c0392b","#7a1a1a","#e67e22","#a85200",
               "#f1c40f","#a07800","#ffffff","#888888","#333333","#000000"];
  const palB=document.createElement("div"); palB.className="paleta-base";
  BASES.forEach(hex=>{
    const dot=document.createElement("div");
    dot.className="pc"+(item.data.color===hex?" on":"");
    dot.style.background=hex;
    dot.onclick=(e)=>{
      e.stopPropagation();
      palB.querySelectorAll(".pc").forEach(d=>d.classList.remove("on"));
      dot.classList.add("on");
      card.style.background=hbg(hex);
      updateDoc(doc(db,secId,item.id),{color:hex});
      const {h,s,l}=hexToHsl(hex);
      slH.value=h;slS.value=s;slL.value=l;syncSliders();
    };
    palB.appendChild(dot);
  });
  card.appendChild(palB);

  /* SLIDERS HSL */
  const sg=document.createElement("div"); sg.className="slider-group";
  function makeSlider(lbl,mn,mx,val){
    const row=document.createElement("div"); row.className="slider-row";
    const lb=document.createElement("label"); lb.textContent=lbl;
    const sl=document.createElement("input"); sl.type="range"; sl.min=mn; sl.max=mx; sl.value=val;
    const vd=document.createElement("span"); vd.className="slider-val"; vd.textContent=val;
    row.appendChild(lb);row.appendChild(sl);row.appendChild(vd);
    return {row,sl,vd};
  }
  const iHsl=item.data.color?hexToHsl(item.data.color):{h:140,s:70,l:20};
  const {row:rH,sl:slH,vd:vH}=makeSlider("Tono",0,360,iHsl.h);
  const {row:rS,sl:slS,vd:vS}=makeSlider("Saturación",0,100,iHsl.s);
  const {row:rL,sl:slL,vd:vL}=makeSlider("Brillo",2,98,iHsl.l);

  const prevRow=document.createElement("div"); prevRow.className="color-prev-row";
  const prev=document.createElement("div"); prev.className="color-preview";
  const btnAp=document.createElement("button"); btnAp.className="btn-ap"; btnAp.textContent="Aplicar color";

  function syncSliders(){
    const h=+slH.value,s=+slS.value,l=+slL.value;
    vH.textContent=h; vS.textContent=s+"%"; vL.textContent=l+"%";
    prev.style.background=`hsl(${h},${s}%,${l}%)`;
    slH.style.background="linear-gradient(to right,hsl(0,80%,50%),hsl(60,80%,50%),hsl(120,80%,50%),hsl(180,80%,50%),hsl(240,80%,50%),hsl(300,80%,50%),hsl(360,80%,50%))";
    slS.style.background=`linear-gradient(to right,hsl(${h},0%,${l}%),hsl(${h},100%,${l}%))`;
    slL.style.background=`linear-gradient(to right,hsl(${h},${s}%,2%),hsl(${h},${s}%,50%),hsl(${h},${s}%,98%))`;
  }
  syncSliders();
  slH.oninput=syncSliders; slS.oninput=syncSliders; slL.oninput=syncSliders;

  btnAp.onclick=(e)=>{
    e.stopPropagation();
    const hex=hslToHex(+slH.value,+slS.value,+slL.value);
    palB.querySelectorAll(".pc").forEach(d=>d.classList.remove("on"));
    card.style.background=hbg(hex);
    updateDoc(doc(db,secId,item.id),{color:hex});
    toast("🎨 Color aplicado");
  };

  prevRow.appendChild(prev);prevRow.appendChild(btnAp);
  sg.appendChild(rH);sg.appendChild(rS);sg.appendChild(rL);sg.appendChild(prevRow);
  card.appendChild(sg);

  /* IMAGEN */
  card.appendChild(dv());
  const uz=document.createElement("div"); uz.className="uz";
  uz.innerHTML="<span>📷 Toca para subir imagen</span>";
  const fi=document.createElement("input"); fi.type="file"; fi.accept="image/*";
  fi.onchange=()=>{
    const f=fi.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{updateDoc(doc(db,secId,item.id),{img:ev.target.result});toast("🖼 Imagen guardada");};
    r.readAsDataURL(f);
  };
  uz.appendChild(fi); card.appendChild(uz);
  if(item.data.img){
    const img=document.createElement("img"); img.className="cimg"; img.src=item.data.img;
    img.onclick=(e)=>{e.stopPropagation();openViewer(img.src);};
    card.appendChild(img);
  }

  /* TABLA */
  if(item.data.tabla){
    card.appendChild(dv());
    card.appendChild(renderTabla(item.data.tabla,item.id,secId));
  }

  /* BOTONES ACCIÓN */
  card.appendChild(dv());
  const acts=document.createElement("div"); acts.className="card-actions";

  const btnT=document.createElement("button"); btnT.className="btn-acc";
  btnT.innerHTML="📊 Agregar tabla";
  btnT.onclick=(e)=>{e.stopPropagation();askPassword(()=>abrirTablaModal(item.id,secId));};

  const btnD=document.createElement("button"); btnD.className="btn-acc";
  btnD.innerHTML="⬇️ Descargar";
  btnD.onclick=(e)=>{e.stopPropagation();askPassword(()=>descargarNota(item.id));};

  const btnX=document.createElement("button"); btnX.className="btn-acc danger";
  btnX.innerHTML="🗑 Eliminar";
  btnX.onclick=(e)=>{e.stopPropagation();askPassword(async()=>{await deleteDoc(doc(db,secId,item.id));toast("🗑 Eliminada");});};

  acts.appendChild(btnT);acts.appendChild(btnD);acts.appendChild(btnX);
  card.appendChild(acts);

  return card;
}

/* ══ MOVER ══ */
async function moverCard(cardId,secId,dir){
  const snap=await getDocs(collection(db,secId));
  const docs=[]; snap.forEach(d=>docs.push({id:d.id,data:d.data()}));
  docs.sort((a,b)=>(a.data.order??0)-(b.data.order??0));
  const idx=docs.findIndex(d=>d.id===cardId),ni=idx+dir;
  if(ni<0||ni>=docs.length) return;
  await Promise.all([
    updateDoc(doc(db,secId,docs[idx].id),{order:ni}),
    updateDoc(doc(db,secId,docs[ni].id), {order:idx})
  ]);
}

/* ══ RENDER TABLA (lee objeto plano, NO nested arrays) ══ */
function renderTabla(td,cardId,secId){
  const wrap=document.createElement("div"); wrap.className="tw";
  const grosorActual=td.grosor||1;
  const datos=td.datos||{};

  /* slider grosor */
  const gr=document.createElement("div"); gr.className="grosor-row";
  const grLbl=document.createElement("label"); grLbl.textContent="Grosor líneas";
  const grSl=document.createElement("input"); grSl.type="range"; grSl.min=1; grSl.max=8; grSl.value=grosorActual;
  const grVal=document.createElement("span"); grVal.className="slider-val"; grVal.textContent=grosorActual+"px";
  gr.appendChild(grLbl);gr.appendChild(grSl);gr.appendChild(grVal);

  /* controles */
  const ctrl=document.createElement("div"); ctrl.className="tw-ctrl";
  const bf=document.createElement("button"); bf.className="bt"; bf.textContent="＋ Fila";
  bf.onclick=async(e)=>{
    e.stopPropagation();
    const fi=td.filas;
    for(let c=0;c<td.cols;c++) datos[`${fi}_${c}`]="";
    td.filas++;
    td.datos=datos;
    await updateDoc(doc(db,secId,cardId),{tabla:td});
  };
  const bc=document.createElement("button"); bc.className="bt"; bc.textContent="＋ Columna";
  bc.onclick=async(e)=>{
    e.stopPropagation();
    const ci=td.cols;
    for(let f=0;f<td.filas;f++) datos[`${f}_${ci}`]="";
    td.cols++;
    td.datos=datos;
    await updateDoc(doc(db,secId,cardId),{tabla:td});
  };
  const bfs=document.createElement("button"); bfs.className="bt"; bfs.textContent="⛶ Pantalla completa";
  bfs.onclick=(e)=>{e.stopPropagation();openViewerTabla(wrap);};
  ctrl.appendChild(bf);ctrl.appendChild(bc);ctrl.appendChild(bfs);

  wrap.appendChild(gr);
  wrap.appendChild(ctrl);

  /* tabla */
  const table=document.createElement("table");
  for(let f=0;f<td.filas;f++){
    const tr=document.createElement("tr");
    for(let c=0;c<td.cols;c++){
      const cell=document.createElement(f===0?"th":"td");
      cell.contentEditable="true";
      cell.textContent=getCelda(datos,f,c);
      cell.style.border=`${grosorActual}px solid rgba(255,255,255,${Math.min(0.15+grosorActual*0.05,0.6)})`;
      cell.addEventListener("blur",()=>{
        setCelda(datos,f,c,cell.textContent);
        td.datos=datos;
        updateDoc(doc(db,secId,cardId),{tabla:td});
      });
      tr.appendChild(cell);
    }
    table.appendChild(tr);
  }
  wrap.appendChild(table);

  /* grosor slider */
  grSl.oninput=()=>{
    const v=+grSl.value;
    grVal.textContent=v+"px";
    table.querySelectorAll("td,th").forEach(cell=>{
      cell.style.border=`${v}px solid rgba(255,255,255,${Math.min(0.15+v*0.05,0.6)})`;
    });
    td.grosor=v;
    updateDoc(doc(db,secId,cardId),{tabla:td});
  };

  /* resize */
  const rh=document.createElement("div"); rh.className="rh"; rh.textContent="⠿ ⠿ ⠿";
  let sy=0,sh=0;
  const om=(e)=>wrap.style.height=(sh+((e.touches?e.touches[0].clientY:e.clientY)-sy))+"px";
  const oe=()=>{document.removeEventListener("mousemove",om);document.removeEventListener("mouseup",oe);document.removeEventListener("touchmove",om);document.removeEventListener("touchend",oe);};
  rh.addEventListener("mousedown",(e)=>{sy=e.clientY;sh=wrap.offsetHeight;document.addEventListener("mousemove",om);document.addEventListener("mouseup",oe);e.preventDefault();});
  rh.addEventListener("touchstart",(e)=>{sy=e.touches[0].clientY;sh=wrap.offsetHeight;document.addEventListener("touchmove",om,{passive:false});document.addEventListener("touchend",oe);},{passive:true});
  wrap.appendChild(rh);

  return wrap;
}

/* ══ DESCARGAR ══ */
function descargarNota(cardId){
  const card=document.querySelector(`[data-id="${cardId}"]`); if(!card) return;
  const texto=card.querySelector("textarea")?.value||"";
  const imgSrc=card.querySelector(".cimg")?.src||"";
  const tw=card.querySelector(".tw");
  let tHTML="";
  if(tw){
    const t=tw.querySelector("table");
    if(t){
      const clone=t.cloneNode(true);
      clone.style.cssText="border-collapse:collapse;width:100%";
      tHTML=`<h3 style="color:#00e676;margin-top:20px;font-family:sans-serif">Tabla</h3>${clone.outerHTML}`;
    }
  }
