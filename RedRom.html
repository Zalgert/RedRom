<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedRom</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f3d2e'/><text x='50' y='72' font-size='58' text-anchor='middle' fill='%2300e676' font-family='Arial'>🔬</text></svg>">

<style>
:root {
  --verde-oscuro: #0a2e1f;
  --verde-medio: #0f4a30;
  --verde-claro: #1a7a52;
  --verde-brillante: #00e676;
  --verde-neon: #39ff8a;
  --blanco: #f0fff4;
  --gris-suave: rgba(255,255,255,0.08);
  --gris-borde: rgba(255,255,255,0.15);
  --sombra: 0 8px 32px rgba(0,0,0,0.4);
  --radio: 16px;
  --radio-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  font-family: 'Outfit', sans-serif;
  background: var(--verde-oscuro);
  color: var(--blanco);
  overflow-x: hidden;
}

/* ── FONDO ANIMADO ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,230,118,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(26,122,82,0.18) 0%, transparent 60%),
    linear-gradient(160deg, #0a2e1f 0%, #0f3d2e 40%, #1a4a35 70%, #0a2e1f 100%);
  z-index: -2;
  pointer-events: none;
}

/* partículas decorativas */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle 1px at 15% 25%, rgba(0,230,118,0.4) 0%, transparent 100%),
    radial-gradient(circle 1px at 85% 15%, rgba(0,230,118,0.3) 0%, transparent 100%),
    radial-gradient(circle 2px at 60% 70%, rgba(0,230,118,0.2) 0%, transparent 100%),
    radial-gradient(circle 1px at 30% 80%, rgba(0,230,118,0.35) 0%, transparent 100%),
    radial-gradient(circle 1px at 90% 50%, rgba(0,230,118,0.25) 0%, transparent 100%);
  z-index: -1;
  pointer-events: none;
  animation: sparkle 8s ease-in-out infinite alternate;
}

@keyframes sparkle {
  0%   { opacity: 0.4; }
  100% { opacity: 1; }
}

/* ── ANIMACIONES ── */
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50%       { transform: translateY(-14px) rotate(2deg); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(0,230,118,0.3); }
  50%       { box-shadow: 0 0 40px rgba(0,230,118,0.6); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes lockShake {
  0%,100% { transform: rotate(0deg); }
  20%     { transform: rotate(-12deg); }
  40%     { transform: rotate(12deg); }
  60%     { transform: rotate(-8deg); }
  80%     { transform: rotate(8deg); }
}
@keyframes popIn {
  0%   { transform: scale(0.7); opacity: 0; }
  70%  { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes cardEntry {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── LOGIN ── */
#login {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 20px;
  padding: 30px 20px;
  animation: slideIn 0.6s ease;
}

.login-microscopio {
  font-size: 80px;
  animation: float 3.5s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(0,230,118,0.5));
  cursor: default;
}

.login-titulo {
  font-family: 'Space Mono', monospace;
  font-size: 2.4em;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--verde-brillante), #a8ffcb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
}

.login-subtitulo {
  font-size: 0.85em;
  color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: -10px;
}

.login-card {
  background: rgba(15, 74, 48, 0.45);
  border: 1px solid var(--gris-borde);
  border-radius: 24px;
  padding: 35px 30px;
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  backdrop-filter: blur(20px);
  box-shadow: var(--sombra), 0 0 0 1px rgba(0,230,118,0.08);
}

.input-wrap {
  position: relative;
}

.input-wrap .icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  pointer-events: none;
}

input[type="password"], input[type="text"] {
  width: 100%;
  padding: 13px 14px 13px 42px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--gris-borde);
  border-radius: var(--radio-sm);
  color: var(--blanco);
  font-family: 'Outfit', sans-serif;
  font-size: 1em;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

input[type="password"]:focus, input[type="text"]:focus {
  border-color: var(--verde-brillante);
  box-shadow: 0 0 0 3px rgba(0,230,118,0.15);
}

.btn-verde {
  padding: 13px;
  background: linear-gradient(135deg, var(--verde-claro), var(--verde-brillante));
  border: none;
  border-radius: var(--radio-sm);
  color: #0a2e1f;
  font-family: 'Outfit', sans-serif;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: transform 0.15s, box-shadow 0.3s;
  box-shadow: 0 4px 15px rgba(0,230,118,0.3);
}

.btn-verde:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,230,118,0.4); }
.btn-verde:active { transform: translateY(0); }

.error { color: #ff6b6b; font-size: 0.85em; text-align: center; min-height: 16px; }

/* ── MENÚ ── */
#menu {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 30px 20px;
  animation: slideIn 0.5s ease;
}

.menu-header {
  text-align: center;
  margin-bottom: 10px;
}

.menu-microscopio {
  font-size: 60px;
  animation: float 3.5s ease-in-out infinite;
  filter: drop-shadow(0 0 15px rgba(0,230,118,0.5));
}

.menu-titulo {
  font-family: 'Space Mono', monospace;
  font-size: 1.8em;
  font-weight: 700;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--verde-brillante), #a8ffcb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 360px;
}

.btn-menu {
  padding: 16px 12px;
  background: rgba(15, 74, 48, 0.5);
  border: 1px solid var(--gris-borde);
  border-radius: var(--radio);
  color: var(--blanco);
  font-family: 'Outfit', sans-serif;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.25s;
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.btn-menu .emoji { font-size: 26px; }
.btn-menu:hover { background: rgba(0,230,118,0.15); border-color: var(--verde-brillante); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,230,118,0.2); }

.btn-menu-secundario {
  padding: 12px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--gris-borde);
  border-radius: var(--radio-sm);
  color: rgba(255,255,255,0.7);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9em;
  cursor: pointer;
  width: 100%;
  max-width: 360px;
  transition: all 0.2s;
}

.btn-menu-secundario:hover { background: rgba(255,255,255,0.08); color: var(--blanco); }

/* ── SECCIONES ── */
.section {
  display: none;
  padding: 20px 16px 80px;
  max-width: 680px;
  margin: 0 auto;
  animation: slideIn 0.4s ease;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--gris-borde);
}

.section-header h2 {
  font-family: 'Space Mono', monospace;
  font-size: 1.3em;
  letter-spacing: 2px;
  color: var(--verde-brillante);
}

.btn-volver {
  padding: 8px 14px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--gris-borde);
  border-radius: 8px;
  color: rgba(255,255,255,0.7);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-volver:hover { background: rgba(255,255,255,0.08); color: var(--blanco); }

.btn-agregar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  background: linear-gradient(135deg, rgba(0,230,118,0.2), rgba(0,230,118,0.08));
  border: 1px dashed rgba(0,230,118,0.5);
  border-radius: var(--radio);
  color: var(--verde-brillante);
  font-family: 'Outfit', sans-serif;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  justify-content: center;
  transition: all 0.25s;
  margin-bottom: 6px;
}
.btn-agregar:hover { background: rgba(0,230,118,0.15); border-style: solid; }

/* ── CARDS ── */
.card {
  background: rgba(15, 60, 40, 0.5);
  border: 1px solid var(--gris-borde);
  border-radius: var(--radio);
  padding: 16px;
  margin-bottom: 14px;
  backdrop-filter: blur(12px);
  box-shadow: var(--sombra);
  transition: border-color 0.3s;
  position: relative;
  animation: cardEntry 0.35s ease;
}
.card:hover { border-color: rgba(0,230,118,0.3); }

/* cabecera card */
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
}

.card-num {
  font-family: 'Space Mono', monospace;
  font-size: 0.75em;
  color: rgba(0,230,118,0.6);
  padding: 3px 8px;
  background: rgba(0,230,118,0.08);
  border-radius: 6px;
  border: 1px solid rgba(0,230,118,0.2);
}

/* botones mover */
.move-btns {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.btn-mover {
  width: 28px;
  height: 28px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--gris-borde);
  border-radius: 6px;
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  padding: 0;
}
.btn-mover:hover { background: rgba(0,230,118,0.2); border-color: var(--verde-brillante); color: var(--verde-brillante); }
.btn-mover:disabled { opacity: 0.25; cursor: not-allowed; }

/* textarea */
.card textarea {
  width: 100%;
  min-height: 85px;
  padding: 12px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--gris-borde);
  border-radius: var(--radio-sm);
  color: var(--blanco);
  font-family: 'Outfit', sans-serif;
  font-size: 0.95em;
  resize: vertical;
  outline: none;
  transition: border-color 0.25s;
  line-height: 1.5;
}
.card textarea:focus { border-color: var(--verde-brillante); box-shadow: 0 0 0 2px rgba(0,230,118,0.1); }

/* paleta de tonos */
.paleta-label {
  font-size: 0.78em;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.paleta {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.paleta-color {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.paleta-color:hover { transform: scale(1.2); }
.paleta-color.activo { border-color: white; transform: scale(1.15); }

/* imagen upload */
.upload-zona {
  border: 1px dashed rgba(0,230,118,0.35);
  border-radius: var(--radio-sm);
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  color: rgba(255,255,255,0.5);
  font-size: 0.85em;
  position: relative;
  overflow: hidden;
}
.upload-zona:hover { border-color: var(--verde-brillante); background: rgba(0,230,118,0.05); color: var(--blanco); }
.upload-zona input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.card-img {
  width: 100%;
  border-radius: var(--radio-sm);
  cursor: zoom-in;
  transition: transform 0.3s;
  margin-top: 4px;
}
.card-img:hover { transform: scale(1.01); }

/* tabla */
.tabla-container {
  overflow-x: auto;
  border-radius: var(--radio-sm);
  border: 1px solid var(--gris-borde);
}
.tabla-container table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88em;
}
.tabla-container td, .tabla-container th {
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 10px;
  color: var(--blanco);
}
.tabla-container th {
  background: rgba(0,230,118,0.12);
  font-weight: 600;
  color: var(--verde-brillante);
}
.tabla-container td[contenteditable="true"] { outline: none; }
.tabla-container td[contenteditable="true"]:focus {
  background: rgba(0,230,118,0.08);
  outline: 1px solid rgba(0,230,118,0.4);
}

.btn-tabla {
  padding: 8px 14px;
  background: rgba(0,230,118,0.12);
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: 8px;
  color: var(--verde-brillante);
  font-family: 'Outfit', sans-serif;
  font-size: 0.82em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-tabla:hover { background: rgba(0,230,118,0.22); }

.divider {
  height: 1px;
  background: var(--gris-borde);
  margin: 12px 0;
}

/* ── MENÚ CONTEXTUAL (long press) ── */
#ctxMenu {
  display: none;
  position: fixed;
  z-index: 1000;
  background: rgba(10, 46, 31, 0.97);
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: var(--radio);
  padding: 8px;
  min-width: 180px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,230,118,0.1);
  backdrop-filter: blur(20px);
  animation: popIn 0.25s ease;
}

.ctx-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.92em;
  font-weight: 500;
  transition: background 0.2s;
  color: var(--blanco);
}
.ctx-item:hover { background: rgba(0,230,118,0.12); }
.ctx-item .ctx-icon { font-size: 18px; width: 22px; text-align: center; }
.ctx-item.danger { color: #ff6b6b; }
.ctx-item.danger:hover { background: rgba(255,107,107,0.12); }
.ctx-sep { height: 1px; background: var(--gris-borde); margin: 4px 0; }

/* ── POPUP CONTRASEÑA ── */
#passBox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  justify-content: center;
  align-items: center;
  z-index: 1100;
}

.pass-content {
  background: linear-gradient(145deg, rgba(10,46,31,0.97), rgba(15,74,48,0.95));
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: 24px;
  padding: 35px 30px;
  width: 100%;
  max-width: 320px;
  position: relative;
  animation: popIn 0.3s ease;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 40px rgba(0,230,118,0.15);
  text-align: center;
}

.pass-candado {
  font-size: 52px;
  display: block;
  margin-bottom: 12px;
  animation: float 2.5s ease-in-out infinite;
  filter: drop-shadow(0 0 12px rgba(0,230,118,0.5));
}

.pass-candado.shake { animation: lockShake 0.5s ease; }

.pass-titulo {
  font-family: 'Space Mono', monospace;
  font-size: 1.1em;
  color: var(--verde-brillante);
  margin-bottom: 6px;
  letter-spacing: 2px;
}

.pass-sub {
  font-size: 0.8em;
  color: rgba(255,255,255,0.4);
  margin-bottom: 20px;
}

#closePass {
  position: absolute;
  top: 14px; right: 16px;
  cursor: pointer;
  font-size: 20px;
  color: rgba(255,255,255,0.4);
  transition: color 0.2s;
  background: none;
  border: none;
  line-height: 1;
}
#closePass:hover { color: var(--blanco); }

/* ── VIEWER ── */
#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 1200;
  backdrop-filter: blur(6px);
}

#viewer img {
  max-width: 95%;
  max-height: 90vh;
  border-radius: var(--radio);
  box-shadow: 0 0 80px rgba(0,0,0,0.8);
}

#closeViewer {
  position: absolute;
  top: 16px; right: 20px;
  font-size: 30px;
  cursor: pointer;
  color: rgba(255,255,255,0.6);
  transition: color 0.2s, transform 0.2s;
  background: rgba(0,0,0,0.4);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#closeViewer:hover { color: var(--blanco); transform: scale(1.1); }

/* ── FIRMA ── */
#firma {
  position: fixed;
  bottom: 14px;
  right: 16px;
  font-family: 'Space Mono', monospace;
  font-size: 0.7em;
  color: rgba(0,230,118,0.5);
  letter-spacing: 1px;
  pointer-events: none;
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,230,118,0.15);
  border: 1px solid rgba(0,230,118,0.4);
  border-radius: 30px;
  padding: 10px 22px;
  font-size: 0.88em;
  color: var(--verde-brillante);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 2000;
  backdrop-filter: blur(10px);
  white-space: nowrap;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── RESPONSIVE ── */
@media (max-width: 400px) {
  .menu-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-menu { padding: 14px 8px; font-size: 0.85em; }
}
</style>
</head>
<body>

<!-- ════════════════════ LOGIN ════════════════════ -->
<div id="login">
  <div class="login-microscopio">🔬</div>
  <div class="login-titulo">RedRom</div>
  <div class="login-subtitulo">Sistema de Notas</div>

  <div class="login-card">
    <div class="input-wrap">
      <span class="icon">🔑</span>
      <input type="password" id="mainPass" placeholder="Contraseña de acceso" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-verde" onclick="login()">Entrar →</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<!-- ════════════════════ MENÚ ════════════════════ -->
<div id="menu">
  <div class="menu-header">
    <div class="menu-microscopio">🔬</div>
    <div class="menu-titulo">RedRom</div>
  </div>

  <div class="menu-grid">
    <button class="btn-menu" onclick="openSection('notas')">
      <span class="emoji">📋</span>Notas
    </button>
    <button class="btn-menu" onclick="openSection('vista')">
      <span class="emoji">👁</span>Vista
    </button>
    <button class="btn-menu" onclick="openSection('adicional')">
      <span class="emoji">➕</span>Adicional
    </button>
    <button class="btn-menu" onclick="refreshApp()">
      <span class="emoji">🔄</span>Refrescar
    </button>
  </div>

  <button class="btn-menu-secundario" onclick="logout()">↩ Salir</button>
</div>

<!-- ════════════════════ SECCIONES ════════════════════ -->
<div id="notas"     class="section"></div>
<div id="vista"     class="section"></div>
<div id="adicional" class="section"></div>

<!-- ════════════════════ VIEWER ════════════════════ -->
<div id="viewer">
  <div id="closeViewer" onclick="closeViewer()">✕</div>
  <img id="viewImg" alt="">
</div>

<!-- ════════════════════ POPUP CONTRASEÑA ════════════════════ -->
<div id="passBox">
  <div class="pass-content">
    <button id="closePass" onclick="cerrarPopup()">✕</button>
    <span class="pass-candado" id="passLock">🔒</span>
    <div class="pass-titulo">Acceso protegido</div>
    <div class="pass-sub">Ingresá la contraseña de edición</div>
    <div class="input-wrap" style="margin-bottom:12px;">
      <span class="icon">🔑</span>
      <input type="password" id="passInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkPass()">
    </div>
    <button class="btn-verde" onclick="checkPass()">Confirmar</button>
    <div id="passError" class="error" style="margin-top:8px;"></div>
  </div>
</div>

<!-- ════════════════════ MENÚ CONTEXTUAL ════════════════════ -->
<div id="ctxMenu">
  <div class="ctx-item" onclick="ctxAction('editar')">
    <span class="ctx-icon">✏️</span> Editar nota
  </div>
  <div class="ctx-item" onclick="ctxAction('tabla')">
    <span class="ctx-icon">📊</span> Agregar tabla
  </div>
  <div class="ctx-item" onclick="ctxAction('descargar')">
    <span class="ctx-icon">⬇️</span> Descargar
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxAction('eliminar')">
    <span class="ctx-icon">🗑</span> Eliminar
  </div>
</div>

<!-- ════════════════════ TOAST ════════════════════ -->
<div id="toast"></div>

<!-- ════════════════════ FIRMA ════════════════════ -->
<div id="firma">✦ Hecho por Alexis Antonio</div>


<!-- ════════════════════ SCRIPT ════════════════════ -->
<script type="module">
import { initializeApp }      from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, addDoc, updateDoc, deleteDoc,
         doc, collection, onSnapshot }
  from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ── CONFIG ── */
const firebaseConfig = {
  apiKey:      "TU_API",
  authDomain:  "TU_AUTH",
  projectId:   "TU_ID"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const MAIN = "RedRom007";
const EDIT = "RedRom009";

/* TONOS DE COLOR */
const TONOS = [
  // Verdes
  "#0f3d2e","#1a6644","#27ae60","#2ecc71","#a8ffcb",
  // Azules
  "#0d2137","#1a4a7a","#2980b9","#3498db","#a8d8ff",
  // Morados
  "#2d1b4e","#6c3483","#9b59b6","#d2b4de","#f5eef8",
  // Rojos/naranjas
  "#4a1a1a","#922b21","#e74c3c","#f39c12","#fde8c8",
  // Neutros
  "#1a1a2e","#2c2c3e","#4a4a5a","#7f8c8d","#bdc3c7",
];

/* ── LOGIN ── */
window.login = () => {
  const v = document.getElementById("mainPass").value.trim();
  if (v === MAIN) {
    document.getElementById("login").style.display = "none";
    document.getElementById("menu").style.display  = "flex";
    localStorage.setItem("ok","1");
  } else {
    document.getElementById("loginError").textContent = "Contraseña incorrecta";
    setTimeout(() => document.getElementById("loginError").textContent = "", 2500);
  }
};

window.onload = () => {
  if (localStorage.getItem("ok") === "1") {
    document.getElementById("login").style.display = "none";
    document.getElementById("menu").style.display  = "flex";
  }
};

window.logout = () => { localStorage.clear(); location.reload(); };

/* ── TOAST ── */
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

/* ── POPUP CONTRASEÑA ── */
let passCallback = null;

function askPassword(callback) {
  document.getElementById("passBox").style.display    = "flex";
  document.getElementById("passInput").value          = "";
  document.getElementById("passError").textContent    = "";
  document.getElementById("passLock").style.animation = "float 2.5s ease-in-out infinite";
  passCallback = callback;
  setTimeout(() => document.getElementById("passInput").focus(), 100);
}

window.checkPass = () => {
  if (document.getElementById("passInput").value === EDIT) {
    document.getElementById("passBox").style.display = "none";
    passCallback && passCallback();
  } else {
    const lock = document.getElementById("passLock");
    lock.style.animation = "none";
    void lock.offsetWidth;
    lock.style.animation = "lockShake 0.5s ease";
    setTimeout(() => lock.style.animation = "float 2.5s ease-in-out infinite", 600);
    document.getElementById("passError").textContent = "Contraseña incorrecta";
    setTimeout(() => document.getElementById("passError").textContent = "", 2000);
  }
};

window.cerrarPopup = () => {
  document.getElementById("passBox").style.display = "none";
};

/* ── MENÚ CONTEXTUAL ── */
let ctxCardId   = null;
let ctxSectionId = null;
let longTimer   = null;

function showCtxMenu(e, cardId, sectionId) {
  ctxCardId    = cardId;
  ctxSectionId = sectionId;
  const m = document.getElementById("ctxMenu");
  m.style.display = "block";
  const x = Math.min(e.clientX || e.touches?.[0]?.clientX || 50, window.innerWidth  - 200);
  const y = Math.min(e.clientY || e.touches?.[0]?.clientY || 50, window.innerHeight - 200);
  m.style.left = x + "px";
  m.style.top  = y + "px";
}

document.addEventListener("click", (e) => {
  if (!document.getElementById("ctxMenu").contains(e.target))
    document.getElementById("ctxMenu").style.display = "none";
});

window.ctxAction = (action) => {
  document.getElementById("ctxMenu").style.display = "none";
  if (!ctxCardId) return;

  if (action === "editar") {
    askPassword(() => {
      const card = document.querySelector(`[data-id="${ctxCardId}"]`);
      if (card) { card.querySelector("textarea").focus(); toast("✏️ Podés editar la nota"); }
    });
  }
  else if (action === "tabla") {
    askPassword(() => {
      const card = document.querySelector(`[data-id="${ctxCardId}"]`);
      if (card) insertarTabla(card, ctxCardId, ctxSectionId);
    });
  }
  else if (action === "descargar") {
    askPassword(() => descargarNota(ctxCardId));
  }
  else if (action === "eliminar") {
    askPassword(async () => {
      await deleteDoc(doc(db, ctxSectionId, ctxCardId));
      toast("🗑 Nota eliminada");
    });
  }
};

/* ── SECCIONES ── */
window.openSection = (id) => {
  document.querySelectorAll(".section").forEach(s => s.style.display = "none");
  document.getElementById("menu").style.display = "none";
  const sec = document.getElementById(id);
  sec.style.display = "block";

  if (sec.dataset.loaded) return;
  sec.dataset.loaded = "1";

  // Header
  const header = document.createElement("div");
  header.className = "section-header";
  header.innerHTML = `
    <button class="btn-volver" onclick="volverMenu()">← Menú</button>
    <h2>${id === "notas" ? "📋 Notas" : id === "vista" ? "👁 Vista" : "➕ Adicional"}</h2>
  `;
  sec.appendChild(header);

  // Botón agregar
  const addBtn = document.createElement("button");
  addBtn.className = "btn-agregar";
  addBtn.innerHTML = `<span>＋</span> Añadir nota`;
  addBtn.onclick = () => addNota(id);
  sec.appendChild(addBtn);

  // Contenedor de cards
  const container = document.createElement("div");
  container.id = "container-" + id;
  sec.appendChild(container);

  // Snapshot
  onSnapshot(collection(db, id), (snap) => {
    container.innerHTML = "";
    const docs = [];
    snap.forEach(d => docs.push({ id: d.id, data: d.data() }));

    // Ordenar por índice si existe
    docs.sort((a, b) => (a.data.order ?? 0) - (b.data.order ?? 0));

    docs.forEach((item, idx) => {
      container.appendChild(crearCard(item, idx, docs.length, id));
    });
  });
};

window.volverMenu = () => {
  document.querySelectorAll(".section").forEach(s => s.style.display = "none");
  document.getElementById("menu").style.display = "flex";
};

async function addNota(sectionId) {
  const snap = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js")
    .then(m => m.getDocs(m.collection(db, sectionId)));
  const order = snap.size;
  await addDoc(collection(db, sectionId), { text: "", order, img: "", color: "" });
  toast("✅ Nota añadida");
}

/* ── CREAR CARD ── */
function crearCard(item, idx, total, sectionId) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = item.id;

  if (item.data.color) card.style.background = hexToCardBg(item.data.color);

  // Long press
  let lt = null;
  const startLong = (e) => {
    lt = setTimeout(() => {
      navigator.vibrate && navigator.vibrate(30);
      showCtxMenu(e, item.id, sectionId);
    }, 600);
  };
  const cancelLong = () => clearTimeout(lt);
  card.addEventListener("mousedown",  startLong);
  card.addEventListener("touchstart", startLong, { passive: true });
  card.addEventListener("mouseup",    cancelLong);
  card.addEventListener("mouseleave", cancelLong);
  card.addEventListener("touchend",   cancelLong);

  // ── TOP (número + mover) ──
  const top = document.createElement("div");
  top.className = "card-top";

  const num = document.createElement("span");
  num.className = "card-num";
  num.textContent = `#${idx + 1}`;

  const moveBtns = document.createElement("div");
  moveBtns.className = "move-btns";

  const btnUp = document.createElement("button");
  btnUp.className = "btn-mover";
  btnUp.textContent = "▲";
  btnUp.disabled = idx === 0;
  btnUp.title = "Mover arriba";
  btnUp.onclick = (e) => { e.stopPropagation(); moverCard(item.id, sectionId, -1); };

  const btnDown = document.createElement("button");
  btnDown.className = "btn-mover";
  btnDown.textContent = "▼";
  btnDown.disabled = idx === total - 1;
  btnDown.title = "Mover abajo";
  btnDown.onclick = (e) => { e.stopPropagation(); moverCard(item.id, sectionId, 1); };

  moveBtns.appendChild(btnUp);
  moveBtns.appendChild(btnDown);
  top.appendChild(num);
  top.appendChild(moveBtns);
  card.appendChild(top);

  // ── TEXTAREA ──
  const ta = document.createElement("textarea");
  ta.placeholder = "Escribí tu nota aquí…";
  ta.value = item.data.text || "";
  ta.addEventListener("blur", () => {
    updateDoc(doc(db, sectionId, item.id), { text: ta.value });
  });
  card.appendChild(ta);

  // ── PALETA DE TONOS ──
  const divider1 = document.createElement("div");
  divider1.className = "divider";
  card.appendChild(divider1);

  const paletaLabel = document.createElement("div");
  paletaLabel.className = "paleta-label";
  paletaLabel.textContent = "Tonos de color";
  card.appendChild(paletaLabel);

  const paleta = document.createElement("div");
  paleta.className = "paleta";

  TONOS.forEach(hex => {
    const dot = document.createElement("div");
    dot.className = "paleta-color";
    if (item.data.color === hex) dot.classList.add("activo");
    dot.style.background = hex;
    dot.title = hex;
    dot.onclick = (e) => {
      e.stopPropagation();
      paleta.querySelectorAll(".paleta-color").forEach(d => d.classList.remove("activo"));
      dot.classList.add("activo");
      card.style.background = hexToCardBg(hex);
      updateDoc(doc(db, sectionId, item.id), { color: hex });
    };
    paleta.appendChild(dot);
  });
  card.appendChild(paleta);

  // ── IMAGEN ──
  const divider2 = document.createElement("div");
  divider2.className = "divider";
  card.appendChild(divider2);

  const uploadZona = document.createElement("div");
  uploadZona.className = "upload-zona";
  uploadZona.innerHTML = `<span>📷 Toca para subir imagen</span>`;

  const fileInput = document.createElement("input");
  fileInput.type  = "file";
  fileInput.accept = "image/*";
  fileInput.onchange = () => {
    const file = fileInput.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = (ev) => {
      updateDoc(doc(db, sectionId, item.id), { img: ev.target.result });
      toast("🖼 Imagen guardada");
    };
    r.readAsDataURL(file);
  };
  uploadZona.appendChild(fileInput);
  card.appendChild(uploadZona);

  if (item.data.img) {
    const img = document.createElement("img");
    img.className = "card-img";
    img.src = item.data.img;
    img.onclick = (e) => { e.stopPropagation(); openViewer(img.src); };
    card.appendChild(img);
  }

  // ── TABLA (si existe) ──
  if (item.data.tabla) {
    card.appendChild(renderizarTabla(item.data.tabla, item.id, sectionId));
  }

  return card;
}

/* ── MOVER CARDS ── */
async function moverCard(cardId, sectionId, direccion) {
  const { getDocs, collection: col } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js");
  const snap = await getDocs(col(db, sectionId));
  const docs = [];
  snap.forEach(d => docs.push({ id: d.id, data: d.data() }));
  docs.sort((a, b) => (a.data.order ?? 0) - (b.data.order ?? 0));

  const idx = docs.findIndex(d => d.id === cardId);
  const newIdx = idx + direccion;
  if (newIdx < 0 || newIdx >= docs.length) return;

  // Intercambiar order
  const updates = [];
  updates.push(updateDoc(doc(db, sectionId, docs[idx].id),    { order: newIdx }));
  updates.push(updateDoc(doc(db, sectionId, docs[newIdx].id), { order: idx }));
  await Promise.all(updates);
}

/* ── TABLA ── */
function insertarTabla(card, cardId, sectionId) {
  const filas = 3, cols = 3;
  const tabla = { filas, cols, datos: Array(filas).fill(null).map(() => Array(cols).fill("")) };
  updateDoc(doc(db, sectionId, cardId), { tabla });
  toast("📊 Tabla agregada");
}

function renderizarTabla(tablaData, cardId, sectionId) {
  const wrap = document.createElement("div");
  wrap.className = "tabla-container";

  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;";

  const btnFila = document.createElement("button");
  btnFila.className = "btn-tabla";
  btnFila.textContent = "+ Fila";
  btnFila.onclick = async (e) => {
    e.stopPropagation();
    tablaData.datos.push(Array(tablaData.cols).fill(""));
    tablaData.filas++;
    await updateDoc(doc(db, sectionId, cardId), { tabla: tablaData });
  };

  const btnCol = document.createElement("button");
  btnCol.className = "btn-tabla";
  btnCol.textContent = "+ Columna";
  btnCol.onclick = async (e) => {
    e.stopPropagation();
    tablaData.datos.forEach(r => r.push(""));
    tablaData.cols++;
    await updateDoc(doc(db, sectionId, cardId), { tabla: tablaData });
  };

  controls.appendChild(btnFila);
  controls.appendChild(btnCol);
  wrap.appendChild(controls);

  const table = document.createElement("table");
  tablaData.datos.forEach((fila, fi) => {
    const tr = document.createElement("tr");
    fila.forEach((celda, ci) => {
      const td = document.createElement(fi === 0 ? "th" : "td");
      td.contentEditable = "true";
      td.textContent = celda;
      td.addEventListener("blur", () => {
        tablaData.datos[fi][ci] = td.textContent;
        updateDoc(doc(db, sectionId, cardId), { tabla: tablaData });
      });
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });

  wrap.appendChild(table);
  return wrap;
}

/* ── DESCARGAR NOTA ── */
function descargarNota(cardId) {
  const card = document.querySelector(`[data-id="${cardId}"]`);
  if (!card) return;

  const texto  = card.querySelector("textarea")?.value || "";
  const imgSrc = card.querySelector(".card-img")?.src || "";
  const tabla  = card.querySelector(".tabla-container");

  let tablaHTML = "";
  if (tabla) {
    tablaHTML = `<br><h3 style="color:#00e676">Tabla</h3>` + tabla.innerHTML;
  }

  const html = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nota RedRom</title>
<style>
  body { font-family: sans-serif; background: #0a2e1f; color: #f0fff4; padding: 30px; }
  h1 { color: #00e676; }
  img { max-width: 100%; border-radius: 10px; margin-top: 16px; }
  table { border-collapse: collapse; width: 100%; margin-top: 16px; }
  td, th { border: 1px solid rgba(255,255,255,0.3); padding: 8px 12px; }
  th { background: rgba(0,230,118,0.15); color: #00e676; }
  p { white-space: pre-wrap; line-height: 1.6; }
</style>
</head>
<body>
  <h1>🔬 Nota RedRom</h1>
  <p>${texto.replace(/</g,"&lt;")}</p>
  ${imgSrc ? `<img src="${imgSrc}" alt="imagen">` : ""}
  ${tablaHTML}
</body>
</html>`;

  const blob = new Blob([html], { type: "text/html" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `nota-redrom-${Date.now()}.html`;
  a.click();
  URL.revokeObjectURL(url);
  toast("⬇️ Nota descargada");
}

/* ── VIEWER ── */
window.openViewer = (src) => {
  document.getElementById("viewer").style.display  = "flex";
  document.getElementById("viewImg").src           = src;
};

window.closeViewer = () => {
  document.getElementById("viewer").style.display = "none";
};

/* ── REFRESH ── */
window.refreshApp = () => {
  document.querySelectorAll(".section").forEach(s => {
    s.innerHTML      = "";
    s.dataset.loaded = "";
    s.style.display  = "none";
  });
  toast("🔄 Recargado");
};

/* ── HELPERS ── */
function hexToCardBg(hex) {
  return `linear-gradient(145deg, ${hex}cc, ${hex}88)`;
}
</script>
</body>
</html>
